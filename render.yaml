databases:
  - name: voice-medical-agent-db
    plan: free
    databaseName: medical_agent
    user: medical_user

services:
  - type: web
    name: voice-medical-agent-app
    plan: free
    env: docker
    dockerfilePath: ./app/Dockerfile
    dockerContext: .
    dockerCommand: sh scripts/start_app.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: voice-medical-agent-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: API_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: voice-medical-agent-worker
    plan: free
    env: docker
    dockerfilePath: ./app/Dockerfile
    dockerContext: .
    dockerCommand: sh scripts/start_worker.sh
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
